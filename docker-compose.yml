services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: babyfoot-app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-babyfoot}:${POSTGRES_PASSWORD:-babyfoot}@db:5432/${POSTGRES_DB:-babyfoot}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret}
      NUXT_PUBLIC_APP_NAME: ${NUXT_PUBLIC_APP_NAME:-Babyfoot Tournament Manager}
    command: sh -c "npm run prisma:deploy && node .output/server/index.mjs"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: babyfoot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-babyfoot}
      POSTGRES_USER: ${POSTGRES_USER:-babyfoot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-babyfoot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-babyfoot} -d ${POSTGRES_DB:-babyfoot}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
